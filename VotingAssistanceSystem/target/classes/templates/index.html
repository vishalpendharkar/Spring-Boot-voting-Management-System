<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Voting Assistance System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f4f4f4;
        }

        .main-box{
            margin-top:100px;
            padding:40px;
            background:white;
            border-radius:15px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:#0d6efd;
            font-weight:bold;
        }

        .btn-custom{
            width:220px;
            margin:10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6 text-center main-box">

            <h1>Voting Assistance System</h1>

            <hr>

            <a href="/admin-login"
               class="btn btn-primary btn-custom">
                Admin Login
            </a>

            <br>

            <a href="/vote-page"
               class="btn btn-success btn-custom">
                Vote Now
            </a>

            <br>

            <a href="/results"
               class="btn btn-dark btn-custom">
                View Results
            </a>

        </div>
    </div>
</div>

</body>
</html>
