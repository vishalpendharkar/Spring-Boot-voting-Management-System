<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Voter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6 mt-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3>Add Voter</h3>

                </div>

                <div class="card-body">

                    <form action="/voters/add"
                          method="post">

                        <div class="mb-3">

                            <label>Name</label>

                            <input type="text"
                                   name="name"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>Thumb ID</label>

                            <input type="text"
                                   name="thumbId"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>Age</label>

                            <input type="number"
                                   name="age"
                                   class="form-control">

                        </div>

                        <button class="btn btn-primary w-100">

                            Add Voter

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
