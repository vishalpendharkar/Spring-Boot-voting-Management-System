<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Candidate List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Candidate List</h2>

    <a th:href="@{/candidates/new}" class="btn btn-primary mb-3">
        Add Candidate
    </a>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Party</th>
            <th>Votes</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="candidate : ${candidates}">

            <td th:text="${candidate.id}"></td>
            <td th:text="${candidate.name}"></td>
            <td th:text="${candidate.partyName}"></td>
            <td th:text="${candidate.votes}"></td>

            <td>

                <a th:href="@{/candidates/edit/{id}(id=${candidate.id})}"
                   class="btn btn-warning">
                    Edit
                </a>

                <a th:href="@{/candidates/delete/{id}(id=${candidate.id})}"
                   class="btn btn-danger">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
