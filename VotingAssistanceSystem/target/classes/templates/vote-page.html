<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Vote</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="mb-4">Cast Your Vote</h2>

        <form th:action="@{/vote}" method="post">

            <div class="mb-3">

                <label class="form-label">
                    Thumb ID
                </label>

                <input type="text"
                       name="thumbId"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Candidate ID
                </label>

                <input type="number"
                       name="candidateId"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-primary">
                Vote
            </button>

        </form>

    </div>

</div>

</body>
</html>
