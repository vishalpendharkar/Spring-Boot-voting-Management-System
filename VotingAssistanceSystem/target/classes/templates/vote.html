<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Vote</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="text-center mb-4">Cast Your Vote</h2>

        <form th:action="@{/vote/submit}" method="post">

            <input type="hidden" name="voterId" th:value="${voterId}">

            <div class="mb-3">

                <label>Select Candidate</label>

                <select name="candidateId" class="form-control">

                    <option th:each="candidate : ${candidates}"
                            th:value="${candidate.id}"
                            th:text="${candidate.name + ' - ' + candidate.party}">
                    </option>

                </select>

            </div>

            <button type="submit" class="btn btn-primary w-100">
                Submit Vote
            </button>

        </form>

    </div>

</div>

</body>
</html>
